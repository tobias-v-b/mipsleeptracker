<!DOCTYPE html>
<html>
<head>
    <title>Live Sleep Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h2>Live Sleep Tracker</h2>

<button onclick="connect()">Verbinden</button>

<h3>Herzfrequenz</h3>
<canvas id="hrChart"></canvas>

<h3>Bewegung</h3>
<canvas id="movChart"></canvas>

<script>

// UUIDs von deinem ESP
const SERVICE_UUID = "12345678-1234-1234-1234-123456789abc";
const CHARACTERISTIC_UUID = "abcd1234-ab12-ab12-ab12-abcdef123456";

// Datenarrays
let hrData = [];
let movData = [];
let labels = [];

// Graphen erstellen
let hrChart = new Chart(document.getElementById("hrChart"), {
    type: "line",
    data: {
        labels: labels,
        datasets: [{
            label: "Herzfrequenz",
            data: hrData,
            borderWidth: 2
        }]
    }
});

let movChart = new Chart(document.getElementById("movChart"), {
    type: "line",
    data: {
        labels: labels,
        datasets: [{
            label: "Bewegung",
            data: movData,
            borderWidth: 2
        }]
    }
});

// Verbindung herstellen
async function connect() {

    try {

        const device = await navigator.bluetooth.requestDevice({
acceptAllDevices: true,
optionalServices: [SERVICE_UUID]
        });

        const server = await device.gatt.connect();

        const service = await server.getPrimaryService(SERVICE_UUID);
        const characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

        await characteristic.startNotifications();

        characteristic.addEventListener('characteristicvaluechanged', handleData);

        console.log("Verbunden mit ESP");

    } catch (error) {
        console.log("Fehler:", error);
    }
}

// Daten empfangen
function handleData(event) {

    // Daten vom ESP lesen
    const value = new TextDecoder().decode(event.target.value);

    // Erwartetes Format: "62,0.10"
    const parts = value.split(",");

    const hr = Number(parts[0]);
    const mov = Number(parts[1]);

    // Neue Daten hinzufügen
    labels.push(labels.length);
    if(hr != 0)
    {
    hrData.push(hr);
    }
    if(mov != 0)
    {
    movData.push(mov);
    }


    // Graphen aktualisieren
    hrChart.update();
    movChart.update();
}

</script>

</body>
</html>
