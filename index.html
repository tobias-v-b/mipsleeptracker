<!DOCTYPE html>
<html lang="de">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sleep Tracker</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 40px; background: #111; color: white; }
    button { padding: 15px 30px; font-size: 18px; border-radius: 10px; border: none; background: #4CAF50; color: white; }
    .wert { font-size: 64px; font-weight: bold; color: #4CAF50; }
    .label { font-size: 18px; color: #aaa; }
  </style>
</head>
<body>
  <h1>Sleep Tracker</h1>
  <button onclick="verbinden()">ESP32 verbinden</button>
  
  <p class="label">Herzfrequenz</p>
  <p class="wert" id="bpm">--</p>
  
  <p class="label">Sauerstoff</p>
  <p class="wert" id="spo2">--</p>

  <script>
    const SERVICE_UUID        = "12345678-1234-1234-1234-123456789abc";
    const CHARACTERISTIC_UUID = "abcd1234-ab12-ab12-ab12-abcdef123456";

    async function verbinden() {
      // 1. Browser fragt nach BLE Gerät → Popup erscheint
      const device = await navigator.bluetooth.requestDevice({
        filters: [{ name: 'SleepTracker' }],
        optionalServices: [SERVICE_UUID]
      });

      // 2. Verbindung aufbauen
      const server = await device.gatt.connect();
      const service = await server.getPrimaryService(SERVICE_UUID);
      const characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

      // 3. Auf neue Daten warten (wird automatisch aufgerufen)
      await characteristic.startNotifications();
      characteristic.addEventListener('characteristicvaluechanged', (event) => {
        const text = new TextDecoder().decode(event.target.value);
        const [bpm, spo2] = text.split(',');
        document.getElementById('bpm').textContent = bpm + ' BPM';
        document.getElementById('spo2').textContent = spo2 + ' %';
      });
    }
  </script>
</body>
</html>
